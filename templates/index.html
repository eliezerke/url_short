<body>
    <div class="container">
        <div class="header">
            <span class="logo">🔗</span>
            <h1>Elabs ShortLinks</h1>
        </div>
        <p>Make your long links short and shareable</p>

        <div class="social-top">
            <a href="https://twitter.com" target="_blank"><i class="fab fa-x-twitter"></i></a>
            <a href="https://facebook.com" target="_blank"><i class="fab fa-facebook-f"></i></a>
            <a href="https://linkedin.com" target="_blank"><i class="fab fa-linkedin-in"></i></a>
            <a href="https://github.com" target="_blank"><i class="fab fa-github"></i></a>
        </div>
        
        <form id="shortenForm">
            <div class="input-group">
                <input 
                    type="url" 
                    name="url" 
                    id="urlInput"
                    placeholder="Paste your long URL here..." 
                    required>
            </div>
            <button type="submit" id="submitBtn">
                <span id="btnText">✨ Shorten URL</span>
                <span class="spinner" id="spinner"></span>
            </button>
        </form>

        <div class="result" id="result">
            <p>Your shortened link is ready!</p>
            <div class="short-url" id="shortUrl"></div>
            <button class="copy-btn" onclick="copyToClipboard()">📋 Copy Link</button>
        </div>
    </div>

    <div class="social-float">
        <a href="https://x.com/eliezerkenya" target="_blank"><i class="fab fa-x-twitter"></i></a>
        <a href="https://facebook.com/eliezerkenya" target="_blank"><i class="fab fa-facebook-f"></i></a>
        <a href="https://instagram.com/eliezerkenya" target="_blank"><i class="fab fa-instagram"></i></a>
        <a href="https://github.com/eliezerke" target="_blank"><i class="fab fa-github"></i></a>
    </div>

    <footer>
        Powered by <a style="color: whitesmoke" href="https://elabskenya.pythonanywhere.com/support" target="_blank"> elabskenya </a> from <a style="color: whitesmoke" href="https://eliezerkenya.pythonanywhere.com" target="_blank"> eliezerkenya</a>
    </footer>

    <script>
        const form = document.getElementById('shortenForm');
        const resultDiv = document.getElementById('result');
        const shortUrlEl = document.getElementById('shortUrl');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const spinner = document.getElementById('spinner');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            submitBtn.disabled = true;
            btnText.style.display = 'none';
            spinner.style.display = 'inline-block';

            const formData = new FormData(form);
            
            try {
                const response = await fetch('/shorten', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.short_url) {
                    shortUrlEl.textContent = data.short_url;
                    resultDiv.style.display = 'block';
                    resultDiv.scrollIntoView({ behavior: 'smooth' });
                } else {
                    alert(data.error || 'Something went wrong');
                }
            } catch (err) {
                alert('Failed to connect to server');
            } finally {
                submitBtn.disabled = false;
                btnText.style.display = 'inline';
                spinner.style.display = 'none';
            }
        });

        function copyToClipboard() {
            const text = shortUrlEl.textContent;
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.querySelector('.copy-btn');
                const original = btn.textContent;
                btn.textContent = '✅ Copied succesfully!';
                setTimeout(() => btn.textContent = original, 2000);
            });
        }
    </script>
</body>
